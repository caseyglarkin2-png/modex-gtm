<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1600 900"
  role="img"
  aria-label="GXO operating-standard coverage map: six tiles representing the partner technologies and platforms that have entered the GXO operating-standard catalog. GXO IQ, Agility Robotics, Apptronik Apollo, Reflex Robotics, and GXO Direct are covered; Yard Network Ops is unfilled."
>
  <!-- Cream background to blend with memo body -->
  <rect width="1600" height="900" fill="#f5f1e8" />

  <g font-family="'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Top eyebrow -->
    <text x="80" y="64" fill="#8a847b" font-size="14" letter-spacing="3.5" font-weight="500">
      GXO OPERATING-STANDARD COVERAGE MAP
    </text>
    <text x="1520" y="64" text-anchor="end" fill="#8a847b" font-size="14" letter-spacing="2.5" font-weight="500">
      6 LAYERS · 5 COVERED · 1 UNFILLED
    </text>

    <!-- Hairline rule under eyebrow -->
    <line x1="80" y1="90" x2="1520" y2="90" stroke="#d8d2c2" stroke-width="1" />

    <!-- ── Tile 1 : GXO IQ ───────────────────────────────────── -->
    <rect x="80" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="110" cy="160" r="4" fill="#a89e8b" />
    <text x="310" y="295" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      GXO IQ
    </text>
    <text x="310" y="335" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 2 : AGILITY ROBOTICS ───────────────────────────────────── -->
    <rect x="570" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="600" cy="160" r="4" fill="#a89e8b" />
    <text x="800" y="285" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      AGILITY
    </text>
    <text x="800" y="320" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      ROBOTICS
    </text>
    <text x="800" y="360" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 3 : APPTRONIK APOLLO ─────────────────────────────────────── -->
    <rect x="1060" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="1090" cy="160" r="4" fill="#a89e8b" />
    <text x="1290" y="285" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      APPTRONIK
    </text>
    <text x="1290" y="320" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      APOLLO
    </text>
    <text x="1290" y="360" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 4 : REFLEX ROBOTICS ──────────────────────────────────── -->
    <rect x="80" y="480" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="110" cy="510" r="4" fill="#a89e8b" />
    <text x="310" y="635" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      REFLEX
    </text>
    <text x="310" y="670" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      ROBOTICS
    </text>
    <text x="310" y="710" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 5 : GXO DIRECT ───────────────────────────────────────── -->
    <rect x="570" y="480" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="600" cy="510" r="4" fill="#a89e8b" />
    <text x="800" y="645" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      GXO DIRECT
    </text>
    <text x="800" y="685" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 6 : YARD NETWORK OPS  (unfilled — accent border) ── -->
    <rect x="1060" y="480" width="460" height="320" fill="none" stroke="#E11D27" stroke-width="2" />
    <circle cx="1090" cy="510" r="4" fill="none" stroke="#E11D27" stroke-width="1.5" />
    <text x="1290" y="625" text-anchor="middle" fill="#E11D27" font-size="24" font-weight="700" letter-spacing="6">
      YARD NETWORK
    </text>
    <text x="1290" y="665" text-anchor="middle" fill="#E11D27" font-size="24" font-weight="700" letter-spacing="6">
      OPS
    </text>
    <text x="1290" y="705" text-anchor="middle" fill="#a89e8b" font-size="13" letter-spacing="3" font-weight="500">
      — unfilled —
    </text>

    <!-- Hairline rule above source attribution -->
    <line x1="80" y1="840" x2="1520" y2="840" stroke="#d8d2c2" stroke-width="1" />

    <!-- Bottom source attribution -->
    <text x="800" y="872" text-anchor="middle" fill="#a89e8b" font-size="12" letter-spacing="2.5" font-weight="500">
      COMPOSITION · PUBLIC-RECORD SOURCES · ACCOUNT NAMES REDACTED
    </text>
  </g>
</svg>

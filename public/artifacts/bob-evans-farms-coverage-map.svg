<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1600 900"
  role="img"
  aria-label="Refrigerated Retail OpCo coverage map: six tiles representing Post Holdings Refrigerated Retail operating companies. Bob Evans, Michael Foods, Crystal Farms, Potato Products of Idaho, and 8th Avenue have site-level cold-chain operations covered; Yard Network Ops across the segment is unfilled."
>
  <!-- Cream background to blend with memo body -->
  <rect width="1600" height="900" fill="#f5f1e8" />

  <g font-family="'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Top eyebrow -->
    <text x="80" y="64" fill="#8a847b" font-size="14" letter-spacing="3.5" font-weight="500">
      REFRIGERATED RETAIL OPCO COVERAGE MAP
    </text>
    <text x="1520" y="64" text-anchor="end" fill="#8a847b" font-size="14" letter-spacing="2.5" font-weight="500">
      6 TILES · 5 COVERED · 1 UNFILLED
    </text>

    <!-- Hairline rule under eyebrow -->
    <line x1="80" y1="90" x2="1520" y2="90" stroke="#d8d2c2" stroke-width="1" />

    <!-- ── Tile 1 : BOB EVANS ───────────────────────────────────── -->
    <rect x="80" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="110" cy="160" r="4" fill="#a89e8b" />
    <text x="310" y="285" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      BOB EVANS
    </text>
    <text x="310" y="320" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="2" font-weight="500">
      4 plants · Springfield OH hub
    </text>
    <text x="310" y="355" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 2 : MICHAEL FOODS ───────────────────────────────────── -->
    <rect x="570" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="600" cy="160" r="4" fill="#a89e8b" />
    <text x="800" y="285" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      MICHAEL FOODS
    </text>
    <text x="800" y="320" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="2" font-weight="500">
      eggs · refrigerated potatoes
    </text>
    <text x="800" y="355" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 3 : CRYSTAL FARMS ─────────────────────────────────────── -->
    <rect x="1060" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="1090" cy="160" r="4" fill="#a89e8b" />
    <text x="1290" y="285" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      CRYSTAL FARMS
    </text>
    <text x="1290" y="320" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="2" font-weight="500">
      refrigerated dairy
    </text>
    <text x="1290" y="355" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 4 : POTATO PRODUCTS OF IDAHO ──────────────────────────────────── -->
    <rect x="80" y="480" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="110" cy="510" r="4" fill="#a89e8b" />
    <text x="310" y="625" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="600" letter-spacing="5">
      POTATO PRODUCTS
    </text>
    <text x="310" y="660" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="600" letter-spacing="5">
      OF IDAHO
    </text>
    <text x="310" y="695" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="2" font-weight="500">
      acquired March 2025
    </text>
    <text x="310" y="725" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 5 : 8TH AVENUE ───────────────────────────────────────── -->
    <rect x="570" y="480" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="600" cy="510" r="4" fill="#a89e8b" />
    <text x="800" y="635" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      8TH AVENUE
    </text>
    <text x="800" y="670" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="2" font-weight="500">
      pasta · peanut butter · granola
    </text>
    <text x="800" y="700" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 6 : YARD NETWORK OPS  (unfilled — accent border) ── -->
    <rect x="1060" y="480" width="460" height="320" fill="none" stroke="#D4380D" stroke-width="2" />
    <circle cx="1090" cy="510" r="4" fill="none" stroke="#D4380D" stroke-width="1.5" />
    <text x="1290" y="615" text-anchor="middle" fill="#D4380D" font-size="24" font-weight="700" letter-spacing="6">
      YARD NETWORK
    </text>
    <text x="1290" y="655" text-anchor="middle" fill="#D4380D" font-size="24" font-weight="700" letter-spacing="6">
      OPS
    </text>
    <text x="1290" y="690" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="2" font-weight="500">
      segment-wide operating model
    </text>
    <text x="1290" y="720" text-anchor="middle" fill="#a89e8b" font-size="13" letter-spacing="3" font-weight="500">
      — unfilled —
    </text>

    <!-- Hairline rule above source attribution -->
    <line x1="80" y1="840" x2="1520" y2="840" stroke="#d8d2c2" stroke-width="1" />

    <!-- Bottom source attribution -->
    <text x="800" y="872" text-anchor="middle" fill="#a89e8b" font-size="12" letter-spacing="2.5" font-weight="500">
      COMPOSITION · PUBLIC-RECORD POST HOLDINGS DISCLOSURES · SITE-LEVEL YARD VENDORS REDACTED
    </text>
  </g>
</svg>

<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1600 900"
  role="img"
  aria-label="Crowley operating-standard coverage map: six tiles representing the integrated maritime + land service-line footprint. Container Shipping (PR/Caribbean), US Logistics Solutions, Government Services, Fuel Distribution, and ~125-Year Family-Owned are covered; Yard/Port Execution is unfilled."
>
  <!-- Cream background to blend with memo body -->
  <rect width="1600" height="900" fill="#f5f1e8" />

  <g font-family="'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Top eyebrow -->
    <text x="80" y="64" fill="#8a847b" font-size="14" letter-spacing="3.5" font-weight="500">
      CROWLEY OPERATING-STANDARD COVERAGE MAP
    </text>
    <text x="1520" y="64" text-anchor="end" fill="#8a847b" font-size="14" letter-spacing="2.5" font-weight="500">
      6 LAYERS · 5 COVERED · 1 UNFILLED
    </text>

    <!-- Hairline rule under eyebrow -->
    <line x1="80" y1="90" x2="1520" y2="90" stroke="#d8d2c2" stroke-width="1" />

    <!-- ── Tile 1 : CONTAINER SHIPPING ───────────────────────────────────── -->
    <rect x="80" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="110" cy="160" r="4" fill="#a89e8b" />
    <text x="310" y="270" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="600" letter-spacing="4">
      CONTAINER
    </text>
    <text x="310" y="305" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="600" letter-spacing="4">
      SHIPPING
    </text>
    <text x="310" y="345" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 2 : CARIBBEAN OPERATIONS ───────────────────────────────────── -->
    <rect x="570" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="600" cy="160" r="4" fill="#a89e8b" />
    <text x="800" y="270" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="600" letter-spacing="4">
      CARIBBEAN
    </text>
    <text x="800" y="305" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="600" letter-spacing="4">
      OPERATIONS
    </text>
    <text x="800" y="345" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 3 : US LOGISTICS ─────────────────────────────────────── -->
    <rect x="1060" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="1090" cy="160" r="4" fill="#a89e8b" />
    <text x="1290" y="270" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      US LOGISTICS
    </text>
    <text x="1290" y="305" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      SOLUTIONS
    </text>
    <text x="1290" y="345" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 4 : GOVERNMENT SERVICES ──────────────────────────────────── -->
    <rect x="80" y="480" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="110" cy="510" r="4" fill="#a89e8b" />
    <text x="310" y="620" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="600" letter-spacing="4">
      GOVERNMENT
    </text>
    <text x="310" y="655" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="600" letter-spacing="4">
      SERVICES
    </text>
    <text x="310" y="695" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 5 : FUEL + ~125-YR FAMILY-OWNED ───────────────────────────────────────── -->
    <rect x="570" y="480" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="600" cy="510" r="4" fill="#a89e8b" />
    <text x="800" y="600" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="600" letter-spacing="4">
      FUEL DISTRIBUTION
    </text>
    <text x="800" y="640" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="500" letter-spacing="3">
      ~125-YR FAMILY-OWNED
    </text>
    <text x="800" y="695" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 6 : YARD / PORT EXECUTION  (unfilled — accent border) ── -->
    <rect x="1060" y="480" width="460" height="320" fill="none" stroke="#13294B" stroke-width="2" />
    <circle cx="1090" cy="510" r="4" fill="none" stroke="#13294B" stroke-width="1.5" />
    <text x="1290" y="605" text-anchor="middle" fill="#13294B" font-size="24" font-weight="700" letter-spacing="5">
      YARD / PORT
    </text>
    <text x="1290" y="645" text-anchor="middle" fill="#13294B" font-size="24" font-weight="700" letter-spacing="5">
      EXECUTION
    </text>
    <text x="1290" y="695" text-anchor="middle" fill="#a89e8b" font-size="13" letter-spacing="3" font-weight="500">
      — unfilled —
    </text>

    <!-- Hairline rule above source attribution -->
    <line x1="80" y1="840" x2="1520" y2="840" stroke="#d8d2c2" stroke-width="1" />

    <!-- Bottom source attribution -->
    <text x="800" y="872" text-anchor="middle" fill="#a89e8b" font-size="12" letter-spacing="2.5" font-weight="500">
      COMPOSITION · PUBLIC-RECORD SOURCES · ACCOUNT NAMES REDACTED
    </text>
  </g>
</svg>

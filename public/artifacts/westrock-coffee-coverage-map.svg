<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1600 900"
  role="img"
  aria-label="Westrock Coffee operating coverage map: six tiles representing the multi-state operating footprint. Concord NC, Conway DC, Conway roast-to-RTD, Conway Clark K-Cup, and Little Rock are covered at the site level; Yard Network Ops above the three states is unfilled."
>
  <!-- Cream background to blend with memo body -->
  <rect width="1600" height="900" fill="#f5f1e8" />

  <g font-family="'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace">
    <!-- Top eyebrow -->
    <text x="80" y="64" fill="#8a847b" font-size="14" letter-spacing="3.5" font-weight="500">
      NETWORK COVERAGE MAP · CONCORD + CONWAY + LITTLE ROCK
    </text>
    <text x="1520" y="64" text-anchor="end" fill="#8a847b" font-size="14" letter-spacing="2.5" font-weight="500">
      6 TILES · 5 COVERED · 1 UNFILLED
    </text>

    <!-- Hairline rule under eyebrow -->
    <line x1="80" y1="90" x2="1520" y2="90" stroke="#d8d2c2" stroke-width="1" />

    <!-- ── Tile 1 : CONCORD NC ─────────────────────────────────── -->
    <rect x="80" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="110" cy="160" r="4" fill="#a89e8b" />
    <text x="310" y="275" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      CONCORD
    </text>
    <text x="310" y="315" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="500" letter-spacing="4">
      legacy S&amp;D · ~400 trailers
    </text>
    <text x="310" y="355" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 2 : CONWAY DC ──────────────────────────────────── -->
    <rect x="570" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="600" cy="160" r="4" fill="#a89e8b" />
    <text x="800" y="275" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      CONWAY DC
    </text>
    <text x="800" y="315" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="500" letter-spacing="4">
      530K sq ft · 72 doors
    </text>
    <text x="800" y="355" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 3 : CONWAY ROAST-TO-RTD ────────────────────────── -->
    <rect x="1060" y="130" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="1090" cy="160" r="4" fill="#a89e8b" />
    <text x="1290" y="265" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      CONWAY
    </text>
    <text x="1290" y="305" text-anchor="middle" fill="#1a1a1a" font-size="26" font-weight="600" letter-spacing="5">
      ROAST-TO-RTD
    </text>
    <text x="1290" y="345" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="500" letter-spacing="3">
      ~570K sq ft · Jun 2024
    </text>
    <text x="1290" y="380" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 4 : CLARK K-CUP ────────────────────────────────── -->
    <rect x="80" y="480" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="110" cy="510" r="4" fill="#a89e8b" />
    <text x="310" y="625" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      CLARK K-CUP
    </text>
    <text x="310" y="665" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="500" letter-spacing="4">
      525K sq ft · Jul 2025
    </text>
    <text x="310" y="705" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 5 : LITTLE ROCK ────────────────────────────────── -->
    <rect x="570" y="480" width="460" height="320" fill="none" stroke="#a89e8b" stroke-width="1" />
    <circle cx="600" cy="510" r="4" fill="#a89e8b" />
    <text x="800" y="625" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="600" letter-spacing="6">
      LITTLE ROCK
    </text>
    <text x="800" y="665" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="500" letter-spacing="4">
      HQ · original manufacturing
    </text>
    <text x="800" y="705" text-anchor="middle" fill="#8a847b" font-size="13" letter-spacing="3" font-weight="500">
      — covered —
    </text>

    <!-- ── Tile 6 : YARD NETWORK OPS  (unfilled — accent border) ── -->
    <rect x="1060" y="480" width="460" height="320" fill="none" stroke="#6B3A2A" stroke-width="2" />
    <circle cx="1090" cy="510" r="4" fill="none" stroke="#6B3A2A" stroke-width="1.5" />
    <text x="1290" y="615" text-anchor="middle" fill="#6B3A2A" font-size="24" font-weight="700" letter-spacing="6">
      YARD NETWORK
    </text>
    <text x="1290" y="655" text-anchor="middle" fill="#6B3A2A" font-size="24" font-weight="700" letter-spacing="6">
      OPS
    </text>
    <text x="1290" y="690" text-anchor="middle" fill="#6B3A2A" font-size="14" letter-spacing="3" font-weight="500">
      above three states
    </text>
    <text x="1290" y="725" text-anchor="middle" fill="#a89e8b" font-size="13" letter-spacing="3" font-weight="500">
      — unfilled —
    </text>

    <!-- Hairline rule above source attribution -->
    <line x1="80" y1="840" x2="1520" y2="840" stroke="#d8d2c2" stroke-width="1" />

    <!-- Bottom source attribution -->
    <text x="800" y="872" text-anchor="middle" fill="#a89e8b" font-size="12" letter-spacing="2.5" font-weight="500">
      COMPOSITION · PUBLIC-RECORD SOURCES · NETWORK-TIER LAYER UNRESOLVED
    </text>
  </g>
</svg>

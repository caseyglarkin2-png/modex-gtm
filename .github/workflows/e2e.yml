name: E2E Click Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Every Monday at 7am ET (12:00 UTC) — weekly health check before outreach day
    - cron: '0 12 * * 1'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.11.1
          cache: npm

      - run: npm install --no-audit --no-fund

      - run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deployment
        run: sleep 60

      - run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://modex-gtm.vercel.app

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

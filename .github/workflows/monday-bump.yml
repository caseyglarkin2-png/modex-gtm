name: Monday Thread Bump

on:
  schedule:
    # Every Monday 7:05 AM ET (11:05 UTC)
    - cron: '5 11 * * 1'
  workflow_dispatch:

jobs:
  send-bumps:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send Monday bumps
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          SINCE=$(date -u -d '2 days ago 00:00:00' +%Y-%m-%dT%H:%M:%SZ)
          echo "Running bumps since $SINCE"
          npx tsx scripts/monday-bump.ts --since "$SINCE"
